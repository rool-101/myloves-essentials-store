<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MyLove's Essentials</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:#111;
        }

        .login-box{
            width:90%;
            max-width:400px;
            background:#1c1c1c;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.4);
        }

        h2{
            text-align:center;
            color:#d4af37;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:14px;
            background:#d4af37;
            color:#000;
            border:none;
            border-radius:8px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        #message{
            margin-top:15px;
            text-align:center;
            color:#fff;
        }
    </style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Sign In
</button>

<p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/admin.js"></script>

</body>
</html>
