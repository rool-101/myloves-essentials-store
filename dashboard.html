<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyLove's Essentials Admin</title>

<link rel="stylesheet" href="css/style.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    display:flex;
    min-height:100vh;
    background:#111;
    color:#fff;
}

.sidebar{
    width:250px;
    background:#000;
    padding:20px;
}

.sidebar h2{
    color:#d4af37;
    text-align:center;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    margin-bottom:12px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#fff;
    background:#1c1c1c;
    padding:12px;
    border-radius:8px;
}

.sidebar a:hover{
    background:#d4af37;
    color:#000;
}

.main{
    flex:1;
    padding:25px;
}

.card{
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
}

.card h2{
    color:#d4af37;
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
}

button{
    background:#d4af37;
    color:#000;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,
td{
    padding:12px;
    border-bottom:1px solid #333;
    text-align:left;
}

th{
    color:#d4af37;
}

#status{
    margin-top:15px;
    color:#d4af37;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>💋 MyLove's Essentials</h2>

<ul>
<li><a href="#">📊 Dashboard</a></li>
<li><a href="#">📦 Products</a></li>
<li><a href="#">🛒 Orders</a></li>
<li><a href="#">👥 Customers</a></li>
<li><a href="#">💳 Payments</a></li>
<li><a href="#">⚙️ Settings</a></li>
<li><a href="admin.html">🚪 Logout</a></li>
</ul>

</div>

<div class="main">

<div class="card">

<h2>Add Product</h2>

<input
type="text"
id="name"
placeholder="Product Name">

<input
type="number"
id="price"
placeholder="Price">

<input
type="text"
id="category"
placeholder="Category">

<input
type="number"
id="stock"
placeholder="Stock Quantity">

<textarea
id="description"
placeholder="Description"></textarea>

<input
type="file"
id="image">

<button id="saveProduct">
Save Product
</button>

<p id="status"></p>

</div>

<div class="card">

<h2>Products</h2>

<table>

<thead>

<tr>
<th>Product</th>
<th>Price</th>
<th>Stock</th>
<th>Edit</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="productTable">

<tr>
<td colspan="5">
No products yet.
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
